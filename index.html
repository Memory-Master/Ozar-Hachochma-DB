<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>היכל הזהב: המהדורה האלוהית - מ.א.ע</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&family=Amatic+SC:wght@700&display=swap');
        
        :root {
            --gold: #fcf6ba;
            --main-gold: #d4af37;
            --dark-gold: #996515;
            --bg: #050505;
            --success: #00E676;
            --fail: #FF1744;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; font-family: 'Assistant', sans-serif; user-select: none; margin: 0; padding: 0; }

        body {
            height: 100vh; width: 100vw; overflow: hidden;
            background: radial-gradient(circle at center, #1a150a 0%, #000 100%);
            color: #fff; display: flex; flex-direction: column; align-items: center;
        }

        /* 1. עמודי אש אנימטיביים */
        .pillar {
            position: absolute; bottom: 0; width: 20vw; height: 100vh;
            background: linear-gradient(0deg, rgba(212, 175, 55, 0.2) 0%, transparent 80%);
            filter: blur(100px); z-index: 1; opacity: 0.6; pointer-events: none;
            animation: pulse 4s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.3; } to { opacity: 0.7; } }
        .pillar-left { left: -10vw; } .pillar-right { right: -10vw; }

        /* 2. עיצוב "המגיד" */
        #maggid-box {
            position: absolute; top: 2vh; width: 85%; max-width: 900px;
            background: rgba(0,0,0,0.95); border: 2px solid var(--main-gold);
            border-radius: 25px; padding: 25px; text-align: center;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
            z-index: 1000; transition: 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform: translateY(-160%);
        }
        #maggid-text { font-size: 1.8rem; font-weight: 800; color: var(--gold); text-shadow: 0 2px 8px #000; }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; transition: 0.5s ease-in-out; padding: 10vh 5vw;
        }
        .hidden { display: none !important; transform: scale(0.9); opacity: 0; }

        /* 3. טקסט מוזהב מנצנץ */
        .gold-glow {
            background: linear-gradient(90deg, #d4af37, #fcf6ba, #d4af37, #aa8822);
            background-size: 300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gold-move 4s linear infinite; font-weight: 900;
        }
        @keyframes gold-move { to { background-position: 300% center; } }

        /* 4. לוח המחוונים של הכסף */
        .balance-container {
            background: var(--glass); border: 1px solid var(--main-gold);
            padding: 20px 40px; border-radius: 100px; margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(212,175,55,0.1);
        }
        .balance-display { font-size: 5rem; line-height: 1; }

        /* 5. גלגלי הצלה בעיצוב כפתור זכוכית */
        .lifeline-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--main-gold);
            color: var(--gold); padding: 12px 25px; border-radius: 15px;
            cursor: pointer; font-weight: bold; transition: 0.3s; margin: 0 10px;
            font-size: 1.1rem; text-transform: uppercase;
        }
        .lifeline-btn:hover:not(:disabled) { background: var(--main-gold); color: #000; }
        .lifeline-btn:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        /* 6. קלפי התשובות */
        .ans-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.2);
            padding: 30px; border-radius: 20px; font-size: 1.8rem; font-weight: 700;
            color: #fff; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden; text-align: center;
        }
        .ans-card:hover { border-color: #fff; background: rgba(212, 175, 55, 0.15); transform: translateY(-5px); }
        .correct { background: var(--success) !important; color: #000 !important; box-shadow: 0 0 30px var(--success); }
        .wrong { background: var(--fail) !important; box-shadow: 0 0 30px var(--fail); }

        /* 7. פס טיימר מלכותי */
        #timer-bar { width: 85%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 20px 0; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: linear-gradient(90deg, var(--dark-gold), var(--gold)); transition: width 0.1s linear; }

        /* 8. כפתורי פעולה */
        .action-btn {
            background: linear-gradient(45deg, var(--dark-gold), var(--gold));
            border: none; color: #000; font-size: 1.8rem; padding: 15px 50px;
            border-radius: 50px; font-weight: 900; cursor: pointer;
            transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .action-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* 9. חתימה קבועה - נוצר על ידי מ.א.ע */
        .footer-name {
            position: fixed; bottom: 15px; right: 20px;
            font-size: 0.85rem; color: rgba(212, 175, 55, 0.5);
            letter-spacing: 1px; z-index: 100; font-weight: 300;
        }

        /* 10. אנימציות רעידה ומטבעות */
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-8px, 4px); } 75% { transform: translate(8px, -4px); } }
        .shake { animation: shake 0.12s 4; }
        .coin { position: absolute; font-size: 35px; pointer-events: none; z-index: 1000; }
        
        #combo-tag { font-size: 2rem; color: #FFD700; text-shadow: 0 0 15px orange; font-weight: 900; opacity: 0; }
    </style>
</head>
<body>
    <div class="pillar pillar-left"></div><div class="pillar pillar-right"></div>
    
    <div class="footer-name">נוצר על ידי מ.א.ע</div>
    
    <div id="maggid-box"><div id="maggid-text"></div></div>

    <div class="screen" id="bet-screen">
        <div id="rank-display" style="border: 1px solid var(--main-gold); padding: 8px 25px; border-radius: 50px; color: var(--gold); margin-bottom: 15px; font-weight: 700;">טוען דרגה...</div>
        <div class="balance-container">
            <div class="balance-display gold-glow" id="ui-balance">$0</div>
        </div>
        <div style="margin: 20px 0; font-size: 1.8rem; font-weight: 300;">קבע את סכום ההימור לסיבוב:</div>
        <div style="display: flex; gap: 20px;">
            <button class="action-btn" onclick="prepBet(100)">$100</button>
            <button class="action-btn" onclick="prepBet(500)">$500</button>
            <button class="action-btn" onclick="prepBet('ALL')" style="background: #fff; color: #000;">ALL-IN</button>
        </div>
        <div id="manna-timer" style="margin-top: 30px; color: #888; font-size: 1rem;">מן מהשמיים: +$1 בכל דקה</div>
    </div>

    <div class="screen hidden" id="game-screen">
        <div style="display: flex; justify-content: space-between; width: 85%; align-items: center;">
            <div id="combo-tag">COMBO 🔥</div>
            <div id="q-progress" style="font-size: 1.8rem; color: var(--main-gold); font-weight: 800;">שאלה 1/10</div>
        </div>
        
        <div id="timer-bar"><div id="timer-fill"></div></div>

        <div style="margin-bottom: 30px;">
            <button class="lifeline-btn" id="life-50" onclick="use5050()">50/50</button>
            <button class="lifeline-btn" id="life-hint" onclick="useHint()">רמז מהמגיד</button>
            <button class="lifeline-btn" id="life-skip" onclick="useSkip()">דילוג נביא</button>
        </div>

        <div style="text-align: center; width: 85%; max-width: 1100px;">
            <div id="q-text" style="font-size: 3.2rem; font-weight: 800; margin-bottom: 4vh; line-height: 1.2;"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;" id="options-container">
                <div class="ans-card" id="opt-0" onclick="checkAns(0)"></div>
                <div class="ans-card" id="opt-1" onclick="checkAns(1)"></div>
                <div class="ans-card" id="opt-2" onclick="checkAns(2)"></div>
                <div class="ans-card" id="opt-3" onclick="checkAns(3)"></div>
            </div>
        </div>
    </div>

    <div class="screen hidden" id="result-screen">
        <div id="res-status" style="font-size: 8rem; font-weight: 900;"></div>
        <div id="res-msg" style="font-size: 2.5rem; margin-bottom: 30px;"></div>
        <div id="res-stats" style="background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; margin-bottom: 30px; min-width: 300px; text-align: center;"></div>
        <button class="action-btn" onclick="location.reload()">חזור להיכל</button>
    </div>

    <script>
        /* 12. משפטי המגיד החריפים (גרסה מקוצרת לצורך הקוד, ניתן להוסיף את כולם) */
        const JOKES = {
            correct: ["אשריך! כיוונת לדעת גדולים.", "שפתיים יישק! בקיא ורגיל.", "חזק וברוך, סברא ישרה.", "ניכר שעמלת בתורה!", "תשובה ניצחת, ברוך שכיבנת!", "חילך לאורייתא!", "חד וחלק! בור סוד."],
            wrong: ["אוי, כפרת עוונות... חזור לפרשה.", "נפלת בבור של טעות, היכן העיון?", "אפילו חמורו של פנחס היה נזהר.", "טעות של עם הארץ, חזור לישיבה.", "התבלבלת בין קודש לחול."],
            allin: ["כל הקופה?! ביטחון של שמשון הגיבור!", "השם יעזור, זה הימור של מאמינים!", "אומץ לב של יהודה המכבי!", "מהמר כמו מלך!"],
            hint: ["רש\"י לוחש לך: שים לב לדיוק הפסוק.", "הזמן אוזל, השבת בפתח!", "רמז דק כחוט השערה מהמגיד..."]
        };

        /* 13. מאגר שאלות עם רמות קושי (1-קל, 2-בינוני, 3-קשה) */
        const MASTER_DB = [
            {q: "מי בנה את התיבה?", a: "נח", w: ["אברהם", "משה", "נמרוד"], lvl: 1, hint: "הוא ניצל מהמבול"},
            {q: "כמה ימים צרו סביב יריחו?", a: "7", w: ["3", "10", "40"], lvl: 1, hint: "כמניין ימי השבוע"},
            {q: "מי היה היהודי הראשון?", a: "אברהם", w: ["יצחק", "יעקב", "יהודה"], lvl: 1, hint: "לך לך מארצך..."},
            {q: "איזה חג נקרא חג האסיף?", a: "סוכות", w: ["פסח", "שבועות", "חנוכה"], lvl: 1, hint: "יושבים בצילה"},
            {q: "מי הרג את גוליית?", a: "דוד", w: ["שאול", "שמשון", "יהונתן"], lvl: 1, hint: "היה רועה צאן"},
            {q: "איזה נביא עלה במרכבת אש?", a: "אליהו", w: ["אלישע", "שמואל", "ישעיהו"], lvl: 2, hint: "הוא מגיע לכל ברית"},
            {q: "כמה בנים היו ליעקב?", a: "12", w: ["10", "7", "13"], lvl: 2, hint: "כמניין השבטים"},
            {q: "מי הייתה השופטת היחידה?", a: "דבורה", w: ["יעל", "חנה", "רות"], lvl: 2, hint: "ישבה תחת התומר"},
            {q: "מי היה שר הצבא של שאול?", a: "אבנר בן נר", w: ["יואב בן צרויה", "עמשא", "בניהו"], lvl: 2, hint: "קרוב משפחתו של שאול"},
            {q: "באיזו עיר נולד דוד המלך?", a: "בית לחם", w: ["ירושלים", "חברון", "יריחו"], lvl: 2, hint: "אפרתה"},
            {q: "מי היה שר הצבא של דוד המלך?", a: "יואב בן צרויה", w: ["אבנר", "עמשא", "איתי הגיתי"], lvl: 3, hint: "בן אחותו של דוד"},
            {q: "כמה שנים מלך דוד בסך הכל?", a: "40", w: ["33", "7", "50"], lvl: 3, hint: "מספר עגול ומקודש"},
            {q: "מי בנה את בית המקדש הראשון?", a: "שלמה", w: ["דוד", "חזקיהו", "יואש"], lvl: 3, hint: "החכם באדם"},
            {q: "באיזה הר מת משה רבנו?", a: "נבו", w: ["סיני", "הור", "המורה"], lvl: 3, hint: "בעבר הירדן"},
            {q: "מי היה המלך האחרון ביהודה?", a: "צדקיהו", w: ["יהויכין", "יאשיהו", "חזקיהו"], lvl: 3, hint: "עיניו עורו בבבל"}
        ];

        let state = {
            balance: parseInt(localStorage.getItem('gold_hall_mae_bal')) || 1000,
            qIdx: 0,
            bet: 0,
            combo: 0,
            roundQuestions: [],
            lifelines: { fifty: true, hint: true, skip: true },
            timer: null
        };

        /* 14. מנגנון המגיד */
        function talk(type) {
            const arr = JOKES[type];
            document.getElementById('maggid-text').innerText = arr[Math.floor(Math.random() * arr.length)];
            const box = document.getElementById('maggid-box');
            box.style.transform = 'translateY(0)';
            setTimeout(() => box.style.transform = 'translateY(-160%)', 4000);
        }

        function updateUI() {
            document.getElementById('ui-balance').innerText = `$${state.balance.toLocaleString()}`;
            localStorage.setItem('gold_hall_mae_bal', state.balance);
            
            let rank = "תינוק שנשבה 👶";
            if(state.balance > 100000) rank = "תנא דסייעא 👑";
            else if(state.balance > 25000) rank = "הארי שבחבורה 🦁";
            else if(state.balance > 5000) rank = "בעל קורא 📜";
            document.getElementById('rank-display').innerText = rank;
        }

        function prepBet(amt) {
            state.bet = (amt === 'ALL') ? state.balance : amt;
            if(state.bet > state.balance || state.bet <= 0) return;
            if(amt === 'ALL') talk('allin');
            startRound();
        }

        /* 15. בניית סיבוב לפי רמות (3 קלות, 4 בינוניות, 3 קשות) */
        function startRound() {
            const getByLvl = (l) => MASTER_DB.filter(q => q.lvl === l).sort(() => 0.5 - Math.random());
            state.roundQuestions = [...getByLvl(1).slice(0,3), ...getByLvl(2).slice(0,4), ...getByLvl(3).slice(0,3)];
            state.qIdx = 0; state.combo = 0;
            state.lifelines = { fifty: true, hint: true, skip: true };
            renderLifelines();
            document.getElementById('bet-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const q = state.roundQuestions[state.qIdx];
            document.getElementById('q-progress').innerText = `שאלה ${state.qIdx + 1}/10`;
            document.getElementById('q-text').innerText = q.q;
            
            let opts = [q.a, ...q.w].sort(() => 0.5 - Math.random());
            for(let i=0; i<4; i++) {
                const card = document.getElementById(`opt-${i}`);
                card.innerText = opts[i]; card.className = 'ans-card'; card.style.display = 'block';
            }
            startTimer();
        }

        function startTimer() {
            let timeLeft = 100;
            const fill = document.getElementById('timer-fill');
            clearInterval(state.timer);
            state.timer = setInterval(() => {
                timeLeft -= 0.6; // בערך 16 שניות לשאלה
                fill.style.width = timeLeft + "%";
                if(timeLeft <= 0) { clearInterval(state.timer); endRound(false, "אזל הזמן!"); }
            }, 100);
        }

        function checkAns(idx) {
            clearInterval(state.timer);
            const q = state.roundQuestions[state.qIdx];
            const card = document.getElementById(`opt-${idx}`);
            
            if(card.innerText === q.a) {
                card.classList.add('correct');
                state.combo++;
                spawnCoins();
                talk('correct');
                if(state.combo >= 6) document.getElementById('combo-tag').style.opacity = 1;
                
                setTimeout(() => {
                    state.qIdx++;
                    if(state.qIdx >= 10) endRound(true);
                    else loadQuestion();
                }, 1200);
            } else {
                card.classList.add('wrong');
                document.body.classList.add('shake');
                talk('wrong');
                setTimeout(() => {
                    document.body.classList.remove('shake');
                    endRound(false);
                }, 1200);
            }
        }

        /* גלגלי הצלה */
        function use5050() {
            if(!state.lifelines.fifty) return;
            state.lifelines.fifty = false; renderLifelines();
            const q = state.roundQuestions[state.qIdx];
            let removed = 0;
            for(let i=0; i<4; i++) {
                let card = document.getElementById(`opt-${i}`);
                if(card.innerText !== q.a && removed < 2) { card.style.display = 'none'; removed++; }
            }
        }

        function useHint() {
            if(!state.lifelines.hint) return;
            state.lifelines.hint = false; renderLifelines();
            document.getElementById('maggid-text').innerText = `רמז מרש"י: ${state.roundQuestions[state.qIdx].hint}`;
            document.getElementById('maggid-box').style.transform = 'translateY(0)';
            setTimeout(() => document.getElementById('maggid-box').style.transform = 'translateY(-160%)', 5000);
        }

        function useSkip() {
            if(!state.lifelines.skip) return;
            state.lifelines.skip = false; renderLifelines();
            state.qIdx++; if(state.qIdx >= 10) endRound(true); else loadQuestion();
        }

        function renderLifelines() {
            document.getElementById('life-50').disabled = !state.lifelines.fifty;
            document.getElementById('life-hint').disabled = !state.lifelines.hint;
            document.getElementById('life-skip').disabled = !state.lifelines.skip;
        }

        function endRound(win, msg) {
            clearInterval(state.timer);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const status = document.getElementById('res-status');
            if(win) {
                let bonus = state.combo >= 8 ? 2.5 : 1;
                let prize = state.bet * bonus;
                state.balance += prize;
                status.innerText = "ניצחון מלכותי!";
                status.style.color = "var(--success)";
                document.getElementById('res-msg').innerText = `הרווחת $${prize.toLocaleString()}`;
            } else {
                state.balance -= state.bet;
                if(state.balance <= 0) state.balance = 500;
                status.innerText = "כפרת עוונות...";
                status.style.color = "var(--fail)";
                document.getElementById('res-msg').innerText = msg || "הזהב אבד בסיבוב הזה.";
            }
            
            document.getElementById('res-stats').innerHTML = `
                <p style="font-size: 1.5rem;">רצף (Combo): ${state.combo}</p>
                <p style="font-size: 1.5rem; color: var(--gold);">יתרה חדשה: $${state.balance.toLocaleString()}</p>
            `;
            updateUI();
        }

        function spawnCoins() {
            for(let i=0; i<20; i++) {
                const c = document.createElement('div'); c.className = 'coin'; c.innerText = '💰';
                c.style.left = Math.random() * 100 + 'vw'; c.style.top = '100vh';
                document.body.appendChild(c);
                c.animate([{transform:'translateY(0)', opacity:1}, {transform:'translateY(-115vh) rotate(360deg)', opacity:0}], 2000).onfinish = () => c.remove();
            }
        }

        /* מנגנון מן מהשמיים (בונוס זמן) */
        setInterval(() => { state.balance += 1; updateUI(); }, 60000);

        updateUI();
    </script>
</body>
</html>
